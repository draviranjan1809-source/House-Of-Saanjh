<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard - Complete</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding: 20px 0;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* Search Section */
        .search-section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        #searchInput {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        #searchInput:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        #searchBtn, #locationBtn {
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #searchBtn:hover, #locationBtn:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        #locationBtn {
            padding: 12px 15px;
        }

        .suggestions {
            display: none;
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
        }

        .suggestions.show {
            display: block;
        }

        .suggestion-item {
            padding: 10px 15px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .suggestion-item:hover {
            background: #efefef;
        }

        /* Error Message */
        .error-message {
            display: none;
            background: #ff6b6b;
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            animation: slideIn 0.3s ease;
        }

        .error-message.show {
            display: block;
        }

        /* Loading Spinner */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .loading.hidden {
            display: none;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Main Content */
        .main-content {
            animation: fadeIn 0.5s ease;
        }

        .main-content.hidden {
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Current Weather Section */
        .current-weather {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .weather-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .location-info h2 {
            font-size: 2rem;
            color: #333;
            margin-bottom: 5px;
        }

        .location-info p {
            color: #666;
            font-size: 0.95rem;
        }

        .weather-icon-large {
            font-size: 80px;
            text-align: center;
        }

        .temperature-display {
            text-align: center;
            margin-bottom: 30px;
        }

        .temp-main {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            gap: 5px;
        }

        .temp-value {
            font-size: 4rem;
            font-weight: bold;
            color: #667eea;
        }

        .temp-unit {
            font-size: 1.5rem;
            color: #667eea;
            margin-top: 10px;
        }

        .weather-desc {
            font-size: 1.3rem;
            color: #666;
            text-transform: capitalize;
            margin-top: 10px;
        }

        /* Weather Details Grid */
        .weather-details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .detail-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
        }

        .detail-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .detail-icon {
            font-size: 2rem;
            color: #667eea;
        }

        .detail-label {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 1.3rem;
            font-weight: bold;
            color: #333;
        }

        /* Forecast Section */
        .forecast-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .forecast-section h3,
        .hourly-section h3,
        .air-quality-section h3,
        .sun-info-section h3,
        .favorites-section h3 {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 20px;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
        }

        .forecast-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .forecast-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .forecast-day {
            font-size: 0.95rem;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .forecast-icon {
            font-size: 2rem;
            margin: 10px 0;
        }

        .forecast-temp {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .forecast-minmax {
            font-size: 0.85rem;
            opacity: 0.8;
        }

        /* Hourly Section */
        .hourly-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .hourly-scroll {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 15px;
        }

        .hourly-scroll::-webkit-scrollbar {
            height: 6px;
        }

        .hourly-scroll::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .hourly-scroll::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .hourly-card {
            background: #f5f7fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            min-width: 100px;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .hourly-card:hover {
            background: #667eea;
            color: white;
            transform: translateY(-3px);
        }

        .hourly-time {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .hourly-icon {
            font-size: 1.8rem;
            margin: 8px 0;
        }

        .hourly-temp {
            font-size: 1.1rem;
            font-weight: bold;
        }

        /* Air Quality Section */
        .air-quality-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .aq-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .aq-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .aq-label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .aq-value {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .aq-status {
            font-size: 0.85rem;
            opacity: 0.8;
        }

        /* Sun Info Section */
        .sun-info-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .sun-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .sun-card {
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            color: white;
        }

        .sun-card.sunrise {
            background: linear-gradient(135deg, #ffa500 0%, #ff6347 100%);
        }

        .sun-card.sunset {
            background: linear-gradient(135deg, #ff6347 0%, #8b0000 100%);
        }

        .sun-card i {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .sun-label {
            font-size: 1rem;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .sun-time {
            font-size: 1.8rem;
            font-weight: bold;
        }

        /* Favorites Section */
        .favorites-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .favorites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
        }

        .favorite-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
        }

        .favorite-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .favorite-remove {
            background: #ff6b6b;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.85rem;
            margin-top: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .favorite-remove:hover {
            background: #ff5252;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .search-container {
                flex-direction: column;
            }

            .weather-header {
                flex-direction: column;
                align-items: center;
            }

            .location-info h2 {
                font-size: 1.5rem;
            }

            .temp-value {
                font-size: 3rem;
            }

            .weather-details-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .forecast-grid {
                grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            }

            .sun-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 10px;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .header p {
                font-size: 0.95rem;
            }

            .search-section {
                padding: 15px;
            }

            .current-weather {
                padding: 20px;
            }

            .temp-value {
                font-size: 2.5rem;
            }

            .weather-details-grid {
                grid-template-columns: 1fr;
            }

            .detail-card {
                justify-content: space-between;
            }

            .forecast-grid,
            .favorites-grid {
                grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1><i class="fas fa-cloud-sun"></i> Weather Dashboard</h1>
                <p>Real-time weather information at your fingertips</p>
            </div>
        </header>

        <!-- Search Section -->
        <section class="search-section">
            <div class="search-container">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search for a city..." 
                    autocomplete="off"
                >
                <button id="searchBtn" onclick="searchWeather()">
                    <i class="fas fa-search"></i> Search
                </button>
                <button id="locationBtn" onclick="getCurrentLocation()" title="Use current location">
                    <i class="fas fa-location-dot"></i>
                </button>
            </div>
            <div id="suggestions" class="suggestions"></div>
        </section>

        <!-- Error Message -->
        <div id="errorMsg" class="error-message"></div>

        <!-- Loading Spinner -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Loading weather data...</p>
        </div>

        <!-- Main Content -->
        <main id="mainContent" class="main-content hidden">
            <!-- Current Weather -->
            <section class="current-weather">
                <div class="weather-header">
                    <div class="location-info">
                        <h2 id="cityName"></h2>
                        <p id="currentDate"></p>
                    </div>
                    <div id="weatherIcon" class="weather-icon-large"></div>
                </div>

                <div class="temperature-display">
                    <div class="temp-main">
                        <span id="temperature" class="temp-value"></span>
                        <span class="temp-unit">°C</span>
                    </div>
                    <p id="weatherDescription" class="weather-desc"></p>
                </div>

                <div class="weather-details-grid">
                    <div class="detail-card">
                        <div class="detail-icon">
                            <i class="fas fa-droplet"></i>
                        </div>
                        <div class="detail-content">
                            <p class="detail-label">Humidity</p>
                            <p id="humidity" class="detail-value"></p>
                        </div>
                    </div>

                    <div class="detail-card">
                        <div class="detail-icon">
                            <i class="fas fa-wind"></i>
                        </div>
                        <div class="detail-content">
                            <p class="detail-label">Wind Speed</p>
                            <p id="windSpeed" class="detail-value"></p>
                        </div>
                    </div>

                    <div class="detail-card">
                        <div class="detail-icon">
                            <i class="fas fa-eye"></i>
                        </div>
                        <div class="detail-content">
                            <p class="detail-label">Visibility</p>
                            <p id="visibility" class="detail-value"></p>
                        </div>
                    </div>

                    <div class="detail-card">
                        <div class="detail-icon">
                            <i class="fas fa-gauge"></i>
                        </div>
                        <div class="detail-content">
                            <p class="detail-label">Pressure</p>
                            <p id="pressure" class="detail-value"></p>
                        </div>
                    </div>

                    <div class="detail-card">
                        <div class="detail-icon">
                            <i class="fas fa-sun"></i>
                        </div>
                        <div class="detail-content">
                            <p class="detail-label">Feels Like</p>
                            <p id="feelsLike" class="detail-value"></p>
                        </div>
                    </div>

                    <div class="detail-card">
                        <div class="detail-icon">
                            <i class="fas fa-water"></i>
                        </div>
                        <div class="detail-content">
                            <p class="detail-label">UV Index</p>
                            <p id="uvIndex" class="detail-value"></p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 5-Day Forecast -->
            <section class="forecast-section">
                <h3>5-Day Forecast</h3>
                <div id="forecastContainer" class="forecast-grid"></div>
            </section>

            <!-- Hourly Forecast -->
            <section class="hourly-section">
                <h3>Hourly Forecast</h3>
                <div id="hourlyContainer" class="hourly-scroll"></div>
            </section>

            <!-- Air Quality -->
            <section class="air-quality-section">
                <h3>Air Quality Information</h3>
                <div class="aq-grid">
                    <div class="aq-card">
                        <p class="aq-label">AQI</p>
                        <p id="aqi" class="aq-value"></p>
                        <p id="aqiStatus" class="aq-status"></p>
                    </div>
                    <div class="aq-card">
                        <p class="aq-label">PM2.5</p>
                        <p id="pm25" class="aq-value"></p>
                    </div>
                    <div class="aq-card">
                        <p class="aq-label">PM10</p>
                        <p id="pm10" class="aq-value"></p>
                    </div>
                    <div class="aq-card">
                        <p class="aq-label">O3</p>
                        <p id="o3" class="aq-value"></p>
                    </div>
                </div>
            </section>

            <!-- Sunrise/Sunset -->
            <section class="sun-info-section">
                <h3>Sun Information</h3>
                <div class="sun-grid">
                    <div class="sun-card sunrise">
                        <i class="fas fa-sunrise"></i>
                        <p class="sun-label">Sunrise</p>
                        <p id="sunrise" class="sun-time"></p>
                    </div>
                    <div class="sun-card sunset">
                        <i class="fas fa-sunset"></i>
                        <p class="sun-label">Sunset</p>
                        <p id="sunset" class="sun-time"></p>
                    </div>
                </div>
            </section>
        </main>

        <!-- Favorites -->
        <section class="favorites-section">
            <h3>Favorite Cities</h3>
            <div id="favoritesContainer" class="favorites-grid"></div>
        </section>
    </div>

    <script>
        // API Keys - Get from https://openweathermap.org/api
        const OPENWEATHER_API_KEY = 'YOUR_OPENWEATHER_API_KEY';
        const OPENWEATHER_API_URL = 'https://api.openweathermap.org/data/2.5';
        const GEO_API_URL = 'https://api.openweathermap.org/geo/1.0';

        // State
        let currentWeather = null;
        let forecast = null;
        let favorites = JSON.parse(localStorage.getItem('weatherFavorites')) || [];

        // DOM Elements
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const locationBtn = document.getElementById('locationBtn');
        const errorMsg = document.getElementById('errorMsg');
        const loading = document.getElementById('loading');
        const mainContent = document.getElementById('mainContent');
        const suggestions = document.getElementById('suggestions');

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateFavorites();
            searchWeatherByCity('London');
        });

        // Search for weather
        function searchWeather() {
            const city = searchInput.value.trim();
            if (city) {
                searchWeatherByCity(city);
                searchInput.value = '';
                suggestions.classList.remove('show');
            }
        }

        // Get current location
        function getCurrentLocation() {
            if (navigator.geolocation) {
                loading.classList.remove('hidden');
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const { latitude, longitude } = position.coords;
                        getWeatherByCoords(latitude, longitude);
                    },
                    (error) => {
                        showError('Unable to get your location. Please check permissions.');
                        loading.classList.add('hidden');
                    }
                );
            } else {
                showError('Geolocation is not supported by your browser.');
            }
        }

        // Search weather by city name
        async function searchWeatherByCity(city) {
            loading.classList.remove('hidden');
            clearError();
            
            try {
                const geoResponse = await fetch(
                    `${GEO_API_URL}/direct?q=${city}&limit=5&appid=${OPENWEATHER_API_KEY}`
                );
                
                if (!geoResponse.ok) throw new Error('City not found');
                
                const geoData = await geoResponse.json();
                if (geoData.length === 0) {
                    showError('City not found. Please try another search.');
                    loading.classList.add('hidden');
                    return;
                }
                
                const { lat, lon } = geoData[0];
                getWeatherByCoords(lat, lon);
            } catch (error) {
                showError(error.message);
                loading.classList.add('hidden');
            }
        }

        // Get weather by coordinates
        async function getWeatherByCoords(lat, lon) {
            loading.classList.remove('hidden');
            clearError();
            
            try {
                const weatherResponse = await fetch(
                    `${OPENWEATHER_API_URL}/weather?lat=${lat}&lon=${lon}&appid=${OPENWEATHER_API_KEY}&units=metric`
                );
                
                if (!weatherResponse.ok) throw new Error('Failed to fetch weather data');
                
                currentWeather = await weatherResponse.json();
                
                const forecastResponse = await fetch(
                    `${OPENWEATHER_API_URL}/forecast?lat=${lat}&lon=${lon}&appid=${OPENWEATHER_API_KEY}&units=metric`
                );
                
                if (!forecastResponse.ok) throw new Error('Failed to fetch forecast data');
                
                forecast = await forecastResponse.json();
                
                displayCurrentWeather();
                displayForecast();
                displayHourlyForecast();
                displaySunInfo();
                
                mainContent.classList.remove('hidden');
                loading.classList.add('hidden');
            } catch (error) {
                showError(error.message);
                loading.classList.add('hidden');
            }
        }

        // Display current weather
        function displayCurrentWeather() {
            const { main, weather, wind, clouds, visibility, sys } = currentWeather;
            const description = weather[0].description;
            const icon = getWeatherIcon(weather[0].main);
            
            document.getElementById('cityName').textContent = `${currentWeather.name}, ${currentWeather.sys.country}`;
            document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
            
            document.getElementById('temperature').textContent = Math.round(main.temp);
            document.getElementById('weatherDescription').textContent = description;
            document.getElementById('weatherIcon').innerHTML = icon;
            
            document.getElementById('humidity').textContent = `${main.humidity}%`;
            document.getElementById('windSpeed').textContent = `${Math.round(wind.speed * 3.6)} km/h`;
            document.getElementById('visibility').textContent = `${(visibility / 1000).toFixed(1)} km`;
            document.getElementById('pressure').textContent = `${main.pressure} mb`;
            document.getElementById('feelsLike').textContent = `${Math.round(main.feels_like)}°C`;
            document.getElementById('uvIndex').textContent = `${clouds.all}%`;
        }

        // Display 5-day forecast
        function displayForecast() {
            const forecastContainer = document.getElementById('forecastContainer');
            forecastContainer.innerHTML = '';
            
            const dailyForecasts = {};
            
            forecast.list.forEach(item => {
                const date = new Date(item.dt * 1000).toLocaleDateString();
                
                if (!dailyForecasts[date]) {
                    dailyForecasts[date] = {
                        date,
                        temps: [],
                        icon: getWeatherIcon(item.weather[0].main),
                        description: item.weather[0].description
                    };
                }
                
                dailyForecasts[date].temps.push(item.main.temp);
            });
            
            Object.values(dailyForecasts).slice(0, 5).forEach(day => {
                const minTemp = Math.round(Math.min(...day.temps));
                const maxTemp = Math.round(Math.max(...day.temps));
                
                const card = document.createElement('div');
                card.className = 'forecast-card';
                card.innerHTML = `
                    <div class="forecast-day">${new Date(day.date).toLocaleDateString('en-US', { weekday: 'short' })}</div>
                    <div class="forecast-icon">${day.icon}</div>
                    <div class="forecast-temp">${maxTemp}°</div>
                    <div class="forecast-minmax">${minTemp}° / ${maxTemp}°</div>
                `;
                forecastContainer.appendChild(card);
            });
        }

        // Display hourly forecast
        function displayHourlyForecast() {
            const hourlyContainer = document.getElementById('hourlyContainer');
            hourlyContainer.innerHTML = '';
            
            forecast.list.slice(0, 8).forEach(item => {
                const time = new Date(item.dt * 1000).toLocaleTimeString('en-US', { 
                    hour: '2-digit', 
                    minute: '2-digit' 
                });
                const temp = Math.round(item.main.temp);
                const icon = getWeatherIcon(item.weather[0].main);
                
                const card = document.createElement('div');
                card.className = 'hourly-card';
                card.innerHTML = `
                    <div class="hourly-time">${time}</div>
                    <div class="hourly-icon">${icon}</div>
                    <div class="hourly-temp">${temp}°C</div>
                `;
                hourlyContainer.appendChild(card);
            });
        }

        // Display sun info
        function displaySunInfo() {
            const sunrise = new Date(currentWeather.sys.sunrise * 1000).toLocaleTimeString('en-US', {
                hour: '2-digit',
                minute: '2-digit'
            });
            
            const sunset = new Date(currentWeather.sys.sunset * 1000).toLocaleTimeString('en-US', {
                hour: '2-digit',
                minute: '2-digit'
            });
            
            document.getElementById('sunrise').textContent = sunrise;
            document.getElementById('sunset').textContent = sunset;
        }

        // Get weather icon emoji
        function getWeatherIcon(weatherMain) {
            const icons = {
                'Clear': '☀️',
                'Clouds': '☁️',
                'Rain': '🌧️',
                'Drizzle': '🌦️',
                'Thunderstorm': '⛈️',
                'Snow': '❄️',
                'Mist': '🌫️',
                'Smoke': '🌫️',
                'Haze': '🌫️',
                'Dust': '🌪️',
                'Fog': '🌫️',
                'Sand': '🌪️',
                'Ash': '🌋',
                'Squall': '🌪️',
                'Tornado': '🌪️'
            };
            
            return icons[weatherMain] || '🌤️';
        }

        // Show error message
        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.classList.add('show');
        }

        // Clear error message
        function clearError() {
            errorMsg.classList.remove('show');
            errorMsg.textContent = '';
        }

        // Remove favorite
        function removeFavorite(index) {
            favorites.splice(index, 1);
            localStorage.setItem('weatherFavorites', JSON.stringify(favorites));
            updateFavorites();
        }

        // Update favorites display
        function updateFavorites() {
            const container = document.getElementById('favoritesContainer');
            container.innerHTML = '';
            
            favorites.forEach((city, index) => {
                const btn = document.createElement('button');
                btn.className = 'favorite-btn';
                btn.innerHTML = `
                    <div>${city.name}, ${city.country}</div>
                    <div class="favorite-remove" onclick="removeFavorite(${index}); event.stopPropagation();">✕ Remove</div>
                `;
                btn.onclick = () => getWeatherByCoords(city.lat, city.lon);
                container.appendChild(btn);
            });
        }

        // Search suggestions
        searchInput.addEventListener('input', async (e) => {
            const query = e.target.value.trim();
            
            if (query.length < 2) {
                suggestions.classList.remove('show');
                return;
            }
            
            try {
                const response = await fetch(
                    `${GEO_API_URL}/direct?q=${query}&limit=5&appid=${OPENWEATHER_API_KEY}`
                );
                
                const data = await response.json();
                
                if (data.length > 0) {
                    suggestions.innerHTML = '';
                    data.forEach(city => {
                        const item = document.createElement('div');
                        item.className = 'suggestion-item';
                        item.textContent = `${city.name}, ${city.country}`;
                        item.onclick = () => {
                            searchInput.value = '';
                            suggestions.classList.remove('show');
                            getWeatherByCoords(city.lat, city.lon);
                        };
                        suggestions.appendChild(item);
                    });
                    suggestions.classList.add('show');
                }
            } catch (error) {
                console.error('Error fetching suggestions:', error);
            }
        });

        // Enter key search
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchWeather();
            }
        });

        // Close suggestions on outside click
        document.addEventListener('click', (e) => {
            if (e.target !== searchInput) {
                suggestions.classList.remove('show');
            }
        });
    </script>
</body>
</html>
